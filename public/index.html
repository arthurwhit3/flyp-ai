<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flyp | Assistente IA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div>
        <div class="brand">Flyp</div>
        <div class="brand-subtitle">Soluções em automação e atendimento inteligente</div>
      </div>

      <button id="novaConversa" class="secondary-btn" type="button">+ Nova conversa</button>

      <div class="sidebar-info">
        <p>Temas principais:</p>
        <ul>
          <li>ERP</li>
          <li>Gestão empresarial</li>
          <li>Varejo</li>
          <li>Automação comercial</li>
        </ul>
      </div>
    </aside>

    <main class="chat-panel">
      <header class="chat-header">
        <div>
          <h1>Flyp</h1>
          <p>Assistente virtual inteligente</p>
        </div>
        <div class="status">
          <span class="status-dot"></span>
          Online
        </div>
      </header>

      <section id="chat" class="chat-messages">
        <div class="message bot">
          <div class="bubble">
            Olá! Eu sou o Flyp. Posso te ajudar com sistemas de gestão, ERP e automação comercial.
          </div>
        </div>
      </section>

      <form id="chatForm" class="chat-input-area">
        <input
          type="text"
          id="mensagem"
          placeholder="Digite sua pergunta..."
          autocomplete="off"
        />
        <button type="button" id="enviar">Enviar</button>
      </form>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
