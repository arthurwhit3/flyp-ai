<!DOCTYPE html>
<html lang="pt-BR" data-theme="blue">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flyp | Assistente IA</title>

  <link rel="stylesheet" href="style.css"/>
  <link rel="icon" type="image/png" href="favicon.png"/>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase.js"></script>
  <script src="/script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
</head>

<body>

  <div class="auth-buttons">
    <button id="btnLogin">Login</button>
    <button id="btnSignup">Sign Up</button>
  </div>

  <div class="background-blobs">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <div id="landingScreen" class="landing-screen">
    <div class="landing-card glass">
      <div class="logo-orb">
        <div class="logo-core">F</div>
      </div>

      <h1>Olá, eu sou o Flyp</h1>
      <p>
        Posso te ajudar com perguntas, estudos, curiosidades,
        explicações, tecnologia e muito mais.
      </p>

      <button id="entrarBtn" class="primary-btn">Entrar</button>
    </div>
  </div>

  <div id="appWrapper" class="app-wrapper hidden">
    <div class="app">

      <aside class="sidebar glass">
        <div class="sidebar-top">
          <div class="brand minimal-brand">Flyp</div>

          <button id="novaConversa" class="mini-new-chat-btn">
            + Nova conversa
          </button>
        </div>

        <div class="recent-chats-section">
          <div class="recent-chats-title">Recentes</div>
          <div id="recentChatsList" class="recent-chats-list">
            <p class="recent-empty">Nenhuma conversa ainda.</p>
          </div>
        </div>
      </aside>

      <main class="chat-panel glass">
        <header class="chat-header">
          <h1 id="chatTitle">Nova conversa</h1>

          <div class="header-actions">
            <div class="status">
              <span class="status-dot"></span>
              Online
            </div>

            <button id="menuToggle" class="menu-toggle">
              <span></span><span></span><span></span>
            </button>
          </div>
        </header>

        <section id="chat" class="chat-messages"></section>

        <form id="chatForm" class="chat-input-area">
          <input id="mensagem" placeholder="Digite sua pergunta..." autocomplete="off"/>
          <button type="submit" id="enviar" class="send-icon-btn">➤</button>
        </form>
      </main>
    </div>
  </div>

  <div id="authModal" class="modal hidden">
    <div class="modal-content">
      <h2 id="authTitle">Login</h2>

      <input id="email" type="email" placeholder="Email"/>
      <input id="password" type="password" placeholder="Senha"/>

      <button id="authSubmit">Continuar</button>
      <button id="closeModal">Fechar</button>
    </div>
  </div>

  <script src="supabase.js"></script>
  <script src="script.js"></script>

</body>
</html>
